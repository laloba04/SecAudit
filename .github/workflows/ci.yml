name: SecAudit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Python Scanner Tests ───────────────────────────────────────
  python-tests:
    name: Python Scanner Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd scanner
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: |
          cd scanner
          python -m pytest ../tests/test_scanner.py -v --tb=short

      - name: Scanner CLI smoke test
        run: |
          cd scanner
          python headers_scanner.py https://example.com | python -c "import sys,json; d=json.load(sys.stdin); assert 'score' in d; print(f'✅ Score: {d[\"score\"]}')"

  # ─── Go API Tests ───────────────────────────────────────────────
  go-tests:
    name: Go API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: api/go.sum

      - name: Install dependencies
        run: |
          cd api
          go mod tidy

      - name: Run Go tests
        run: |
          cd api
          go test ./... -v -count=1

      - name: Build API binary
        run: |
          cd api
          go build -o secaudit-api .

  # ─── Frontend Build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
